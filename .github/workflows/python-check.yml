name: Python Check

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  verify:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Compile Python files
        run: |
          python -m py_compile app.py config/settings.py database/session.py scripts/start_platform.py scripts/run_with_auto_update.py utils/runtime_version.py
